name: Docker

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
      - "backend/**"
      - "frontend/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Copy Docker environment blueprint
        run: cp .env.example .env.docker

      - name: Generate self-signed TLS certificates
        run: |
          for dir in nginx/certs qdrant/certs postgres/certs; do
            mkdir -p "$dir"
            openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
              -keyout "$dir/server.key" \
              -out "$dir/server.crt" \
              -subj "/CN=localhost"
          done

      - name: Build Docker images
        run: docker compose build
