x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  nginx:
    build:
      context: .
      target: nginx
    pull_policy: missing
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    stop_grace_period: 10s
    logging: *default-logging
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  api:
    build:
      context: .
      target: api
    expose:
      - "8000"
    pull_policy: missing
    env_file: .env.docker
    environment:
      VECTOR_STORE__TLS_CA_CERT: /etc/qdrant/ca.crt
      DATABASE__URI: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./qdrant/certs/server.crt:/etc/qdrant/ca.crt:ro
      - fastembed_cache:/var/cache/fastembed
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=512M,mode=1777
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 4G

  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    pull_policy: missing
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    expose:
      - "5432"
    env_file: .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - backend
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_READ_SEARCH
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  qdrant:
    build:
      context: ./qdrant
      dockerfile: Dockerfile
    pull_policy: missing
    expose:
      - "6333"
      - "6334"
    env_file: .env.docker
    environment:
      QDRANT__SERVICE__API_KEY: ${VECTOR_STORE__API_KEY:-}
    volumes:
      - qdrant_data:/qdrant/storage
      - ./qdrant/qdrant.yaml:/qdrant/config/production.yaml:ro
    networks:
      - backend
    restart: unless-stopped
    stop_grace_period: 20s
    logging: *default-logging
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

networks:
  frontend:
    driver: bridge
    internal: false
  backend:
    driver: bridge
    internal: true

volumes:
  qdrant_data:
  postgres_data:
  fastembed_cache:
